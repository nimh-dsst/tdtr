[workspace]
name = "tdtR"
version = "0.0.0"
description = "R package interface for Tucker-Davis Technologies data"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[tasks]
document = "Rscript -e \"roxygen2::roxygenise()\""
test = "Rscript -e \"testthat::test_local(stop_on_failure = TRUE)\""
check = "Rscript scripts/r_cmd_check.R"
r-cmd-check = "Rscript scripts/r_cmd_check.R"

[dependencies]
r-base = ">=4.1"
r-jsonlite = "*"
r-reticulate = ">=1.34"
r-rlang = "*"
r-tibble = "*"
r-testthat = ">=3.0"
r-withr = "*"
r-roxygen2 = "*"
r-rcmdcheck = "*"
